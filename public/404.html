
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#080c14" />
    <title>Page Not Found | Thukha Aung</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #080c14;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 75% 15%, rgba(37, 99, 235, 0.12), transparent 32rem),
          radial-gradient(circle at 20% 85%, rgba(16, 185, 129, 0.08), transparent 28rem),
          #080c14;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 72px;
        padding: 0 6vw;
        border-bottom: 1px solid #1e293b;
        background: rgba(8, 12, 20, 0.86);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: #fff;
        text-decoration: none;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .mark {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 1px solid #334155;
        border-radius: 50%;
        color: #34d399;
        font-size: 11px;
      }

      .status {
        color: #64748b;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      main {
        display: grid;
        min-height: calc(100vh - 72px);
        place-items: center;
        padding: 48px 24px;
      }

      .card {
        width: min(720px, 100%);
        padding: clamp(32px, 7vw, 64px);
        border: 1px solid #1e293b;
        border-radius: 24px;
        background: rgba(14, 20, 34, 0.88);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.28);
      }

      .code {
        margin: 0;
        color: #34d399;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 620px;
        margin: 18px 0 0;
        color: #fff;
        font-size: clamp(38px, 8vw, 72px);
        line-height: 0.98;
        letter-spacing: -0.05em;
      }

      p {
        max-width: 560px;
        margin: 24px 0 0;
        color: #94a3b8;
        font-size: 16px;
        line-height: 1.8;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 20px;
        border: 1px solid #334155;
        border-radius: 10px;
        color: #e2e8f0;
        text-decoration: none;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .button-primary {
        border-color: #2563eb;
        background: #2563eb;
        color: #fff;
      }

      .button:hover {
        border-color: #34d399;
        color: #fff;
      }

      .button-primary:hover {
        border-color: #3b82f6;
        background: #3b82f6;
      }

      @media (max-width: 520px) {
        header {
          padding: 0 20px;
        }

        .status {
          display: none;
        }

        .actions,
        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a class="brand" href="/">
        <span class="mark">TA</span>
        <span>Thukha Aung</span>
      </a>
      <span class="status">Error // 404</span>
    </header>

    <main>
      <section class="card" aria-labelledby="page-title">
        <p class="code">404 // Page not found</p>
        <h1 id="page-title">This page went off the grid.</h1>
        <p>
          The address may be incorrect, or the page may have moved. Return to
          the portfolio or continue with the latest ecommerce insights.
        </p>
        <div class="actions">
          <a class="button button-primary" href="/">Back to homepage</a>
          <a class="button" href="/#blog">View the blog</a>
        </div>
      </section>
    </main>
  </body>
</html>
